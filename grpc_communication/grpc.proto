syntax = "proto3";

import "google/protobuf/empty.proto";

service SecondaryChannel {
    // Secondary channel request moved here
    rpc Secondary_media_manager(SecondaryData) returns (TextChunk);
}

service MediaService {
    // RPC method to send audio and image data together
    rpc ProcessAudioImg(AudioImgRequest) returns (stream TextChunk);

    // RPC method to handle image streams
    rpc StreamImages(stream ImageStreamRequest) returns (google.protobuf.Empty);

    // RPC method to get face detections bboxes
    rpc GetBbox(google.protobuf.Empty) returns (FaceBoundingBox);

    // RPC method to clear out the llama and image queue
    rpc ClearQueue(google.protobuf.Empty) returns (QueueRemoval);

}

// Message for sending both image and audio data
message AudioImgRequest {
    bytes audio_data = 1;          // Raw audio bytes
    int32 sample_rate = 2;         // Sampling rate (e.g., 16000 Hz)
    int32 num_channels = 3;        // Number of channels (e.g., 1 for mono, 2 for stereo)
    string audio_encoding = 4;     // Encoding format for audio (e.g., "PCM_16", "MP3")
    string audio_description = 5;  // Optional description for the audio

    bytes image_data = 6;          // Raw image bytes
    string image_format = 7;       // Image format (e.g., "JPEG", "PNG")
    int32 image_width = 8;         // Image width in pixels
    int32 image_height = 9;        // Image height in pixels
    string api_task = 10; // Optional description for the image
    bool skip_face_validation = 11; // When true, skip face area and side-face checks
}

// Response message for sending both image and audio data
message AudioImgResponse {
    string status = 1;             // Status of the operation (e.g., "success", "error")
    string message = 2;            // Additional response message or details
}

// New message for streamed text chunks
message TextChunk {
    string text = 1;              // Chunk of transcribed/generated text
    bool is_final = 2;            // Indicates if this is the final chunk
    string mode = 3;
}

// Message to confirm the removal of queue
message QueueRemoval {
  bool removed = 1;
}

// Message for streaming images
message ImageStreamRequest {
    bytes image_data = 1;          // Raw image bytes
    string image_format = 2;      // Image format (e.g., "JPEG", "PNG")
    int32 image_width = 3;        // Image width in pixels
    int32 image_height = 4;       // Image height in pixels
    string image_description = 5; // Optional description for the image
}

// Message representing a bounding box with four integer coordinates
message FaceBoundingBox {
  int32 x1 = 1; // Top-left x-coordinate
  int32 y1 = 2; // Top-left y-coordinate
  int32 x2 = 3; // Bottom-right x-coordinate
  int32 y2 = 4; // Bottom-right y-coordinate
}

// Secondary channel data related

message SecondaryData {
    string api_task=1;
    optional Image image=2;
    optional Audio audio=3;
}

message Image {
    bytes image_data=1;
}

message Audio {
    bytes audio_data = 1;          // Raw audio bytes
    int32 sample_rate = 2;         // Sampling rate (e.g., 16000 Hz)
    int32 num_channels = 3;        // Number of channels (e.g., 1 for mono, 2 for stereo)
    string audio_encoding = 4;     // Encoding format for audio (e.g., "PCM_16", "MP3")
}

// ============ Speaker Recognition (Phase 1) ============

service SpeakerRecognitionService {
    // Bidirectional streaming: client sends VAD audio segments,
    // server returns speaker identification results
    rpc RecognizeSpeakers(stream SpeakerAudioSegment) returns (stream SpeakerResult);

    // Batch video processing: client uploads video, server annotates and sends back
    rpc ProcessVideo(stream VideoUploadChunk) returns (stream VideoDownloadChunk);
}

message VideoUploadChunk {
    bytes data = 1;                // Raw video file bytes (chunked)
    string filename = 2;          // Original filename (sent in first chunk only)
    float max_duration_seconds = 3; // Only process first N seconds (0 = all, sent in first chunk)
}

message VideoDownloadChunk {
    bytes data = 1;                // Annotated video file bytes (chunked)
    string filename = 2;          // Output filename (sent in first chunk only)
    bool is_last = 3;             // True for the final chunk
    string progress = 4;          // Progress updates (e.g., "Processing frame 120/3600")
}

message SpeakerAudioSegment {
    bytes audio_data = 1;          // Raw PCM_16 audio bytes
    int32 sample_rate = 2;         // 16000 Hz
    int32 num_channels = 3;        // 1 (mono)
    string audio_encoding = 4;     // "PCM_16"
    float segment_start_time = 5;  // VAD segment start timestamp (seconds)
    float segment_duration = 6;    // VAD segment duration (seconds)
    string session_id = 7;         // Groups segments from the same conversation
    string face_id = 8;            // Current face_id from camera (links voice to face)
    bytes image_data = 9;          // Optional: JPEG-encoded camera frame for face recognition
    int32 image_width = 10;        // Image width (if image_data provided)
    int32 image_height = 11;       // Image height (if image_data provided)
    float video_timestamp = 12;    // Video mode: timestamp in the source video (seconds)
}

message SpeakerResult {
    string speaker_id = 1;         // The face_id of the identified speaker (e.g., "face_1")
    float confidence = 2;          // Cosine similarity score (0.0 to 1.0)
    float segment_start_time = 3;  // Corresponding segment start
    float segment_duration = 4;    // Corresponding segment duration
    bool is_new_speaker = 5;       // True if voice was just enrolled for this face_id
    string session_id = 6;         // Echo back session_id
    bool is_correction = 7;        // True if this corrects a previous result after batch diarization
    string status = 8;             // Human-readable status for debugging (e.g., "recognized:face_1")
    float video_timestamp = 9;     // Video mode: echoed timestamp from source video
}

// ============ BRAID (Phase 2) ============
//
// Bayesian Robotic Audio-Visual Identity Decision Network.
// See /workspace/blueprint/BRAID_Blueprint_v1.md for full spec.
// This service is append-only — the existing SpeakerRecognitionService is untouched.

service BraidService {
    // Client streams one 30s tick (audio chunks + frame JPEGs + SSL events + meta).
    // Server replies with per-person decisions and a single robot action.
    rpc RunTick(stream BraidTickChunk) returns (BraidTickResult);
}

message BraidMeta {
    string session_id = 1;
    int32  tick_id = 2;
    double window_start_ts = 3;   // Unix seconds at tick start
    float  robot_heading_rad = 4; // Robot body heading at tick start (world frame)
    int32  audio_sample_rate = 5; // e.g. 16000
    int32  audio_num_channels = 6;// e.g. 4
}

message BraidAudioChunk {
    bytes  pcm = 1;               // Interleaved int16 PCM, channel-first as [ch0 s0, ch1 s0, ch2 s0, ch3 s0, ch0 s1, ...]
    double ts = 2;                // Unix seconds at chunk start
    int32  channels = 3;
    int32  sample_rate = 4;
}

message BraidFrameChunk {
    bytes  jpeg = 1;              // JPEG-encoded RGB frame
    double ts = 2;                // Unix seconds
    int32  width = 3;
    int32  height = 4;
}

message SslEvent {
    float  azimuth_rad = 1;
    float  elevation_rad = 2;
    float  confidence = 3;
    double ts = 4;
}

message BraidTickChunk {
    int32  tick_id = 1;
    string session_id = 2;
    float  robot_heading_rad = 3;
    oneof payload {
        BraidMeta       meta         = 10;
        BraidAudioChunk audio_chunk  = 11;
        BraidFrameChunk frame_chunk  = 12;
        SslEvent        ssl_event    = 13;
    }
}

enum DecisionState {
    UNKNOWN_STATE = 0;
    RECOGNISE = 1;
    CONFIRM = 2;
    ENROL = 3;
    EXPLORE = 4;
    UNKNOWN = 5;
}

enum ActionType {
    STAY = 0;
    ROTATE_LEFT = 1;
    ROTATE_RIGHT = 2;
    MOVE_FORWARD = 3;
}

message PersonDecision {
    string person_id = 1;
    DecisionState state = 2;
    float p_best = 3;
    float p_unk = 4;
    float margin = 5;
    float entropy = 6;
    string identity = 7;              // gallery id or ""
    bool modality_agreement = 8;
    float face_quality = 9;
    float ssl_azimuth_rad = 10;
    float prev_state_hint = 11;       // optional: last tick's state as int (for logs)
    string reason = 12;               // e.g. "no_signal", "low_quality_face"
}

message BraidAction {
    ActionType type = 1;
    float magnitude = 2;              // radians for rotate_*, meters for move_forward
    string reason = 3;
    string target_person_id = 4;
}

message BraidTickResult {
    repeated PersonDecision persons = 1;
    BraidAction action = 2;
    int32 tick_id = 3;
    string session_id = 4;
    double tick_wall_seconds = 5;
}
