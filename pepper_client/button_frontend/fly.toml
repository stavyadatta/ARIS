# fly.toml app configuration file generated for ginny-control on 2026-03-01T17:23:18+11:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ginny-control'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile.cloud'

[http_service]
  internal_port = 8004
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
